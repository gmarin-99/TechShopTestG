<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda TechShop</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Tienda Tech</h1>
    </header>

    <main class="contenedor">

        <aside class="menu">

            <details open>

                <summary>Categorías</summary>
        
                <ul>
                    <li><a href="#">Laptops</a></li>
                    <li><a href="#">Teclados</a></li>
                    <li><a href="#">Mouse</a></li>
                    <li><a href="#">Audífonos</a></li>
                </ul>

            </details>
    
        </aside>    

        <section class="productos">

            <article class="card">
                <img src="img/laptop.webp" alt="Laptop">

                <h3>Laptop Gamer</h3>

                <p>
                    Laptop para gaming y desarrollo.
                </p>

                <button>Comprar</button>
            </article>

            <article class="card">
                <img src="img/teclado.webp" alt="Teclado">

                <h3>Teclado Mecánico</h3>

                <p>
                    Switches mecánicos RGB.
                </p>

                <button>Comprar</button>
            </article>

            <article class="card">
                <img src="img/mouse.jpg" alt="Mouse">

                <h3>Mouse Gamer</h3>

                <p>
                    Sensor óptico de alta precisión.
                </p>

                <button>Comprar</button>
            </article>

            <article class="card">
                <img src="img/audifonos.jpg" alt="Audífonos">

                <h3>Audífonos RGB</h3>

                <p>
                    Sonido envolvente.
                </p>

                <button>Comprar</button>
            </article>

        </section>

    </main>

</body>
</html>
